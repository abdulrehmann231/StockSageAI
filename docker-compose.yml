services:
  postgres:
    # pgvector/pgvector ships Postgres 16 with the `vector` extension preinstalled
    # (drop-in replacement for postgres:16). Powers the Filings RAG agent's
    # embedding store — see backend/services/vector_store.py.
    image: pgvector/pgvector:pg16
    container_name: stocksage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stocksage
      POSTGRES_PASSWORD: stocksage
      POSTGRES_DB: stocksage
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocksage -d stocksage"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stocksage-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  redis-data:
